<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostepnanstyle</title>
    <style>
        /* ตั้งค่าพื้นฐานและพื้นหลัง */
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1514565131-fce0801e5785?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            color: white;
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }

        .container { width: 100%; max-width: 900px; text-align: center; }

        h1 { font-size: 50px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(255,255,255,0.5); }
        
        .stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; }
        .stat-box { text-align: center; }
        .stat-num { font-size: 32px; font-weight: bold; display: block; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; }

        /* การจัดเรียงการ์ด */
        .card-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px;
        }

        .card {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 20px;
            transition: 0.3s;
            text-align: left;
        }
        .card:hover { transform: translateY(-10px); }

        .profile-section { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .card-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; border: 2px solid; }
        .role { font-size: 11px; font-weight: bold; display: block; }
        .name { font-size: 18px; font-weight: bold; }

        .social-btns { display: flex; gap: 10px; }
        .btn { 
            flex: 1; background: #111; color: white; padding: 10px; border-radius: 8px; 
            text-decoration: none; font-size: 13px; border: 1px solid #333;
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .btn:hover { background: #222; }

        /* แยกสีตามตำแหน่ง */
        .gold { border-bottom: 4px solid #ffcc00; }
        .gold .role, .gold .card-img { color: #ffcc00; border-color: #ffcc00; }
        .gold .btn:hover { border-color: #ffcc00; }

        .pink { border-bottom: 4px solid #ff3366; }
        .pink .role, .pink .card-img { color: #ff3366; border-color: #ff3366; }
        .pink .btn:hover { border-color: #ff3366; }

        .section-title { text-align: left; font-size: 18px; margin-bottom: 15px; padding-left: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Nostepnanstyle</h1>

        <div class="stats">
            <div class="stat-box"><span class="stat-num" style="color: #ffcc00;">2</span><span class="stat-label">Founders</span></div>
            <div class="stat-box"><span class="stat-num" style="color: #ff3366;">2</span><span class="stat-label">Leaders</span></div>
            <div class="stat-box"><span class="stat-num" style="color: #3399ff;">0</span><span class="stat-label">Members</span></div>
        </div>

        <h2 class="section-title" style="color: #ffcc00;">FOUNDERS</h2>
        <div class="card-grid">
            <div class="card gold">
                <div class="profile-section">
                    <img src="https://scontent.fbkk25-1.fna.fbcdn.net/v/t39.30808-6/682455395_1279527037700603_2654065833649434675_n.jpg?_nc_cat=111&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=bo6vhu3Z22gQ7kNvwH3g-mx&_nc_oc=AdpNN80nqj072fzDlM2I6omVtB2dl7QyiasWM-j27CjWWq-vyEFoVHJ8Yz9BCV2Rh0RIHjNd6rve4IDg0Pb-YaSJ&_nc_zt=23&_nc_ht=scontent.fbkk25-1.fna&_nc_gid=ZtzNwCbmX4KNsIYtPLHDfA&_nc_ss=7b2a8&oh=00_Af3fUVeLtMyWvK1ATkIUDQQsopyXjiTyEKNwX0Bdo4a-rQ&oe=69F68612" class="card-img">
                    <div><span class="role">FOUNDER</span><span class="name">Raduphead</span></div>
                </div>
                <div class="social-btns"><a href="https://www.facebook.com/nongmind.nostepnanstyle/" target="_blank" class="btn">Facebook</a></div>
            </div>

            <div class="card gold">
                <div class="profile-section">
                    <img src="ใส่ลิงก์รูป" class="card-img">
                    <div><span class="role">FOUNDER</span><span class="name">Gethight</span></div>
                </div>
                <div class="social-btns"><a href="https://www.facebook.com/gethight.lyfestely" target="_blank" class="btn">Facebook</a></div>
            </div>
        </div>

        <h2 class="section-title" style="color: #ff3366; border-top: 1px solid #333; padding-top: 20px;">LEADERS</h2>
        <div class="card-grid">
            <div class="card pink">
                <div class="profile-section">
                    <img src="https://media.discordapp.net/attachments/1497970429464285325/1498668379610025984/GTA5_2026-04-06_04-13-26.jpg?ex=69f1ff31&is=69f0adb1&hm=17762137bb3b54eb23364aaa93d36b6a7b50a5cdc485c37c1c49acb6a214d874&=&format=webp&width=788&height=788" class="card-img">
                    <div><span class="role">LEADER</span><span class="name">Ticha Nostepnanstyle</span></div>
                </div>
                <div class="social-btns"><a href="https://www.facebook.com/profile.php?id=61584644049375" class="btn">Facebook</a></div>
            </div>

            <div class="card pink">
                <div class="profile-section">
                    <img src="https://scontent.fbkk25-1.fna.fbcdn.net/v/t39.30808-6/673886389_1494322468892427_9021933643274295219_n.jpg?_nc_cat=109&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=A9Y2oe9wvbAQ7kNvwG9gcD-&_nc_oc=AdrugHeDogCy9-V84uS386azVwijh-PXViD3IJGhmrwMod9g6ufegJmAA5LyAfXTuD2a5TZXOY5FyC1CKtKbSli2&_nc_zt=23&_nc_ht=scontent.fbkk25-1.fna&_nc_gid=KHOrP_JrNKjP3LKsNRFzBw&_nc_ss=7b2a8&oh=00_Af2ZDByQGLlPQLLH6mB9sr3P_DwywgBI6jsn0oqqp17yBw&oe=69F675ED" class="card-img">
                    <div><span class="role">LEADER</span><span class="name">Ribbin Nostepnanstyle</span></div>
                </div>
                <div class="social-btns"><a href="https://www.facebook.com/profile.php?id=100049440653827" class="btn">Facebook</a></div>
            </div>
        </div>

    </div>
</body>
</html>
