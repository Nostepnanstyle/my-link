<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nostepnanstyle</title>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1514565131-fce0801e5785?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-attachment: fixed;
            color: white;
            font-family: 'Chakra Petch', sans-serif;
            display: flex;
            justify-content: center;
            padding: 50px 20px;
        }

        .container { width: 100%; max-width: 900px; text-align: center; }

        h1 { 
            font-size: clamp(30px, 8vw, 60px); 
            letter-spacing: 5px; 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            color: #fff;
            text-shadow: 0 0 10px #ff3366, 0 0 20px #ff3366; 
        }
        
        .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 40px; flex-wrap: wrap; }
        .stat-box { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; min-width: 130px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-num { font-size: 32px; font-weight: bold; display: block; line-height: 1; margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        .section-title { text-align: left; font-size: 20px; margin: 40px 0 20px; padding-left: 10px; letter-spacing: 2px; border-left: 4px solid; }

        .card-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        .card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            transition: 0.3s ease;
            text-align: left;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.4); }

        .profile-section { display: flex; align-items: center; gap: 15px; }
        .card-img { width: 70px; height: 70px; border-radius: 12px; object-fit: cover; border: 2px solid; flex-shrink: 0; }
        
        .info-text { display: flex; flex-direction: column; justify-content: center; min-width: 0; }
        .role { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .name { font-size: 19px; font-weight: 700; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn { 
            width: 100%; background: rgba(255,255,255,0.08); color: white; padding: 10px; border-radius: 8px; 
            text-decoration: none; font-size: 14px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; justify-content: center; transition: 0.3s;
        }
        .btn:hover { background: #fff; color: #000; font-weight: bold; }

        /* Color Schemes */
        .gold-theme { border-color: #ffcc00; color: #ffcc00; }
        .gold .role, .gold .card-img { color: #ffcc00; border-color: #ffcc00; }
        .gold .name { text-shadow: 0 0 10px rgba(255, 204, 0, 0.4); }

        .pink-theme { border-color: #ff3366; color: #ff3366; }
        .pink .role, .pink .card-img { color: #ff3366; border-color: #ff3366; }
        .pink .name { text-shadow: 0 0 10px rgba(255, 51, 102, 0.4); }

        .blue-theme { border-color: #3399ff; color: #3399ff; }
        .blue .role, .blue .card-img { color: #3399ff; border-color: #3399ff; }
        .blue .name { text-shadow: 0 0 10px rgba(51, 153, 255, 0.4); }
    </style>
</head>
<body>
