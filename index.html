<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My List Style</title>
    <style>
    /* ตั้งค่าพื้นฐานและพื้นหลัง */
    body { 
        background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                    url('https://images.unsplash.com/photo-1514565131-fce0801e5785?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); /* เปลี่ยนรูปพื้นหลังได้ที่นี่ */
        background-size: cover;
        background-attachment: fixed;
        color: white;
        font-family: 'Kanit', sans-serif;
        display: flex;
        justify-content: center;
        padding: 50px 20px;
    }

    .container { width: 100%; max-width: 900px; text-align: center; }

    /* หัวข้อใหญ่ */
    h1 { font-size: 60px; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; text-shadow: 2px 2px 10px rgba(255,255,255,0.5); }
    
    /* ตัวเลขสถิติ (2 2 0) */
    .stats { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; }
    .stat-box { text-align: center; }
    .stat-num { font-size: 32px; font-weight: bold; display: block; }
    .stat-label { font-size: 12px; color: #888; text-transform: uppercase; }

    /* การจัดเรียงการ์ด */
    .card-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
        gap: 20px; 
        margin-top: 20px;
    }

    /* สไตล์ของการ์ดตัวละคร */
    .card {
        background: rgba(20, 20, 20, 0.9);
        border: 1px solid #333;
        border-radius: 20px;
        padding: 20px;
        border-bottom: 4px solid #ffcc00; /* เส้นสีทองข้างล่าง */
        transition: 0.3s;
    }
    .card:hover { transform: translateY(-10px); border-color: #ffcc00; }

    .profile-section { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; text-align: left; }
    .card-img { width: 70px; height: 70px; border-radius: 12px; border: 2px solid #ffcc00; object-fit: cover; }
    .role { font-size: 12px; color: #ffcc00; display: block; }
    .name { font-size: 20px; font-weight: bold; }

    /* ปุ่มโซเชียลในตัวการ์ด */
    .social-btns { display: flex; gap: 10px; }
    .btn { 
        flex: 1; 
        background: #111; 
        color: white; 
        padding: 8px; 
        border-radius: 8px; 
        text-decoration: none; 
        font-size: 13px;
        border: 1px solid #333;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
    }
    .btn:hover { background: #222; border-color: #ffcc00; }
</style>
</head>
<body>
    <div class="container">
        <h1>Nostepnanstyle</h1>

        <div class="stats">
            <div class="stat-box">
                <span class="stat-num" style="color: #ffcc00;">2</span>
                <span class="stat-label">Founders</span>
            </div>
            <div class="stat-box">
                <span class="stat-num" style="color: #ff3366;">2</span>
                <span class="stat-label">Leaders</span>
            </div>
            <div class="stat-box">
                <span class="stat-num" style="color: #3399ff;">0</span>
                <span class="stat-label">Members</span>
            </div>
        </div>

        <h2 style="text-align: left; color: #ffcc00; font-size: 18px; margin-bottom: 15px;">FOUNDERS</h2>
        
        <div class="card-grid">
            
            <div class="card">
                <div class="profile-section">
                    <img src="ใส่ลิ้งก์รูปที่นี่" class="card-img">
                    <div>
                        <span class="role">OWNER</span>
                        <span class="name">NongMind</span>
                    </div>
                </div>
                <div class="social-btns">
                    <a href="#" class="btn">Facebook</a>
                    <a href="#" class="btn">Instagram</a>
                </div>
            </div>

            <div class="card">
                <div class="profile-section">
                    <img src="ใส่ลิ้งก์รูปที่นี่" class="card-img">
                    <div>
                        <span class="role">FOUNDER</span>
                        <span class="name">Raduphead</span>
                    </div>
                </div>
                <div class="social-btns">
                    <a href="#" class="btn">Facebook</a>
                    <a href="#" class="btn">Instagram</a>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
